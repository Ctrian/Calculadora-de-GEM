<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="../styles/style.css" />
    <script src="../scripts/script.js"></script>
  </head>
  <body>
    <div class="calculadora-mejorador-container">
      <h3>Calculadora de Mejorador de Terreno</h3>

      <div class="calculadora-app">
        <nav class="tabs-nav">
          <button class="tab-btn activo" data-target="paso-material">
            Material Selection
          </button>
          <button class="tab-btn" data-target="paso-calculadora">
            Calculator
          </button>
          <button class="tab-btn" data-target="paso-resumen">Summary</button>
        </nav>

        <div id="paso-material" class="tab-content activo">
          <h2>Location details</h2>
          <p>
            Select the best fill material for your grounding system based on
            your location requirements.
          </p>

          <div class="toggles-container">
            <label class="toggle-row">
              <span
                >Horizontal trench excavation permitted (min. depth 0.3m / 1
                feet)</span
              >
              <div class="toggle-switch">
                <input type="checkbox" id="t_trench" checked />
                <span class="slider"></span>
              </div>
            </label>

            <label class="toggle-row">
              <span
                >Vertical hole excavation permitted (min. depth 1.2m / 4
                feet)</span
              >
              <div class="toggle-switch">
                <input type="checkbox" id="t_hole" checked />
                <span class="slider"></span>
              </div>
            </label>

            <label class="toggle-row">
              <span>Clean or potable water available</span>
              <div class="toggle-switch">
                <input type="checkbox" id="t_water" checked />
                <span class="slider"></span>
              </div>
            </label>

            <label class="toggle-row">
              <span style="color: #999">Dust free installation</span>
              <div class="toggle-switch">
                <input type="checkbox" id="t_dust" />
                <span class="slider"></span>
              </div>
            </label>
          </div>

          <button class="btn-siguiente" data-next="paso-calculadora">
            Calculadora
          </button>
        </div>

        <div id="paso-calculadora" class="tab-content oculto">
          <h2>Dimensions Calculator</h2>

          <div class="form-grupo">
            <label for="tipo_instalacion">Tipo de Instalación:</label>
            <select id="tipo_instalacion">
              <option value="zanja">Zanja Horizontal (Trench)</option>
              <option value="varilla">Varilla Vertical (Rod)</option>
            </select>
          </div>

          <div id="campos_zanja" class="seccion-dinamica">
            <div class="form-grupo">
              <label for="z_ancho">Ancho de la zanja (cm):</label>
              <input type="number" id="z_ancho" value="10" min="1" />
            </div>
            <div class="form-grupo">
              <label for="z_profundidad">Profundidad del producto (cm):</label>
              <input type="number" id="z_profundidad" value="5" min="1" />
            </div>
            <div class="form-grupo">
              <label for="z_longitud"
                >Longitud total de la zanja (metros):</label
              >
              <input type="number" id="z_longitud" value="10" min="1" />
            </div>
          </div>

          <div id="campos_varilla" class="seccion-dinamica oculto">
            <div class="form-grupo">
              <label for="v_diametro">Diámetro de perforación (cm):</label>
              <input type="number" id="v_diametro" value="15" min="1" />
            </div>
            <div class="form-grupo">
              <label for="v_longitud"
                >Profundidad de la perforación (metros):</label
              >
              <input type="number" id="v_longitud" value="2.4" min="1" />
            </div>
          </div>

          <button id="btn_calcular" class="btn-calcular">
            Calcular y ver Resumen
          </button>
        </div>

        <div id="paso-resumen" class="tab-content oculto">
          <h2>Resumen de tu Proyecto</h2>

          <div id="resultado_box" class="resultado-box">
            <h4>Resultado Estimado:</h4>
            <p>Volumen a rellenar: <span id="res_volumen">0</span> m³</p>
            <p class="destacado">
              Sacos recomendados: <strong id="res_sacos">0</strong>
            </p>
          </div>

          <button
            class="tab-btn"
            data-target="paso-calculadora"
            style="margin-top: 20px; text-decoration: underline"
          >
            ← Volver a la calculadora
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
